version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: sample-fastapi-app:local
    container_name: fastapi_app
    ports:
      - "8000:8000"
    environment:
      - ENV=development
    # Hot-reload for local dev: override CMD and mount source
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - ./app:/app/app          # live-reload source changes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
